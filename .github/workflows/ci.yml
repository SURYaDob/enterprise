name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cdac_enterprise_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build with Maven
        run: ./mvnw clean compile -B -q
        env:
          SPRING_DATASOURCE_URL: "jdbc:mysql://localhost:3306/cdac_enterprise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_PROFILES_ACTIVE: dev

      - name: Run tests
        run: ./mvnw test -B
        env:
          SPRING_DATASOURCE_URL: "jdbc:mysql://localhost:3306/cdac_enterprise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_PROFILES_ACTIVE: dev

      - name: Package
        run: ./mvnw package -DskipTests -B -q

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-screenshots
          path: screenshots/
          if-no-files-found: warn
          retention-days: 90
