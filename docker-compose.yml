version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: cdac-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cdac_enterprise_db
      MYSQL_USER: cdac_user
      MYSQL_PASSWORD: cdac_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdac-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/cdac_enterprise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: cdac_user
      DB_PASSWORD: cdac_pass
      JWT_SECRET: CHANGE_THIS_TO_A_LONG_SECURE_SECRET_KEY_FOR_DEVELOPMENT_ONLY_123456789
      JWT_EXPIRATION_MS: "900000"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
