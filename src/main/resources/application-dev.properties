# ===========================================
# Development Profile
# ===========================================

spring.datasource.url=jdbc:mysql://localhost:3306/cdac_enterprise_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=CHANGE_THIS_TO_A_LONG_SECURE_SECRET_KEY_FOR_DEVELOPMENT_ONLY_123456789
app.jwt.expiration-ms=900000

logging.level.com.cdac.enterprise=DEBUG
logging.level.org.springframework.security=TRACE
logging.level.org.hibernate.SQL=DEBUG

app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# ========== Email Credentials (Dev) ==========
# Base properties configure spring.mail.host/port and SMTP settings.
# Override credentials here for local development.
# To use Gmail: generate an App Password at https://myaccount.google.com/apppasswords
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
