# ===========================================
# H2 Profile - For Render Deployment
# ===========================================
# In-memory database for demo deployment

spring.datasource.url=jdbc:h2:mem:cdac_enterprise_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=RENDER_DEPLOY_SECRET_KEY_FOR_DEMO_PURPOSES_ONLY_2026
app.jwt.expiration-ms=900000

app.cors.allowed-origins=https://SURYaDob.github.io,http://localhost:3000

logging.level.com.cdac.enterprise=INFO
logging.level.org.springframework.security=INFO
