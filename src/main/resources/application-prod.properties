# ===========================================
# Production Profile
# ===========================================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cdac_enterprise_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_A_LONG_SECURE_SECRET_KEY_FOR_DEVELOPMENT_ONLY_123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

logging.level.com.cdac.enterprise=WARN
logging.level.org.springframework.security=WARN

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
