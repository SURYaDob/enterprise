# ===========================================
# CDAC Enterprise Application & Admission Management System
# ===========================================

spring.application.name=cdac-enterprise
server.port=8080

# Active profile (default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========== DataSource ==========
spring.datasource.url=jdbc:mysql://localhost:3306/cdac_enterprise_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# ========== JPA / Hibernate ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========== JWT ==========
app.jwt.secret=CHANGE_THIS_TO_A_LONG_SECURE_SECRET_KEY_FOR_DEVELOPMENT_ONLY_123456789
app.jwt.expiration-ms=900000

# ========== File Upload ==========
app.file.upload-dir=uploads/documents
app.file.max-size-bytes=5242880

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ========== CORS ==========
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# ========== Actuator ==========
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ========== Logging ==========
logging.level.com.cdac.enterprise=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========== Jackson ==========
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ========== Email ==========
# SMTP host/port are set here so JavaMailSender bean is available in all profiles.
# Credentials are configured in profile-specific files (application-dev.properties / application-prod.properties).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# From address used in password reset emails
app.email.from=no-reply@cdac-enterprise.local